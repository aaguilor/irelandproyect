<!DOCTYPE html>

    <title>U2 Presentation - Thanks</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .thanks-text {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 1.5s ease-out;
        }
    </style>
</head>

    <div class="container" style="flex-direction: column; gap: 3rem;">
        <h2 class="thanks-text" style="margin-bottom: 0;">Thanks for watching</h2>

            <ul style="list-style: none; padding: 0; text-align: left; display: flex; flex-direction: column; gap: 1rem;">

                <li><a href="https://en.wikipedia.org/wiki/U2" target="_blank" style="color: #fff; text-decoration: none; border-bottom: 1px solid #444; padding-bottom: 5px; display: block;">U2 - Wikipedia</a></li>
                <li><a href="https://www.u2songs.com" target="_blank" style="color: #fff; text-decoration: none; border-bottom: 1px solid #444; padding-bottom: 5px; display: block;">U2 Songs - Discography & Info</a></li>
